<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>简易酒馆</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="bg"></div>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <h2>设置</h2>

      <label>代理地址（必须是兼容 OpenAI 的接口根地址）</label>
      <input id="apiBase" type="text" placeholder="https://xxx.com/v1" />

      <label>API Key</label>
      <input id="apiKey" type="password" placeholder="sk-xxxx" />

      <label>模型名</label>
      <input id="model" type="text" placeholder="gpt-4o-mini" value="gpt-4o-mini" />

      <label>系统提示词</label>
      <textarea id="systemPrompt" rows="6" placeholder="你是一个温柔的酒馆角色……"></textarea>

      <label>你的名字</label>
      <input id="userName" type="text" value="我" />

      <label>角色名字</label>
      <input id="charName" type="text" value="酒馆老板娘" />

      <label>背景图片</label>
      <input id="bgUpload" type="file" accept="image/*" />

      <button id="saveSettings">保存设置</button>
      <button id="testApi">测试连接</button>
      <button id="clearChat">清空聊天</button>
    </aside>

    <main class="main">
      <header class="topbar">
        <button id="toggleSidebar">☰</button>
        <div class="title">
          <div id="chatTitle">简易酒馆</div>
          <div id="status">未连接</div>
        </div>
      </header>

      <section class="messages" id="messages"></section>

      <div class="inputBar">
        <textarea id="userInput" placeholder="输入消息，Enter发送，Shift+Enter换行"></textarea>
        <button id="sendBtn">发送</button>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
